<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智谱用量查询测试</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .test-card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h2 {
            color: #333;
            margin-bottom: 16px;
        }
        .input-group {
            margin-bottom: 16px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #555;
        }
        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }
        button {
            background: #4F46E5;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
        }
        button:hover {
            background: #4338ca;
        }
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .result {
            margin-top: 20px;
            padding: 16px;
            background: #f9f9f9;
            border-radius: 8px;
            display: none;
        }
        .result.show {
            display: block;
        }
        .result.success {
            background: #d4edda;
            border: 1px solid #c3e6cb;
        }
        .result.error {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
        }
        .result pre {
            white-space: pre-wrap;
            word-wrap: break-word;
            margin: 0;
            font-size: 12px;
        }
        .help {
            background: #e7f3ff;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
        }
        .help code {
            background: white;
            padding: 2px 6px;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="help">
        📝 <strong>测试说明</strong>：输入你的智谱 API Key 来测试用量查询功能。<br>
        API Key 获取地址：<code>https://open.bigmodel.cn/apikeys</code>
    </div>

    <div class="test-card">
        <h2>🔧 智谱 Coding Plan 用量查询测试</h2>

        <div class="input-group">
            <label>API Key</label>
            <input type="password" id="apiKey" placeholder="输入智谱 API Key">
        </div>

        <div class="input-group">
            <label>区域</label>
            <select id="region">
                <option value="cn">国内版 (open.bigmodel.cn)</option>
                <option value="global">国际版 (api.z.ai)</option>
            </select>
        </div>

        <button onclick="testZhipuUsage()" id="testBtn">
            🚀 测试查询
        </button>

        <div id="result" class="result"></div>
    </div>

    <div class="test-card">
        <h2>📋 API 端点信息</h2>
        <p><strong>本地测试地址：</strong></p>
        <pre>POST http://localhost:3000/api/balance/zhipu-usage</pre>
        <p><strong>生产环境地址：</strong></p>
        <pre>POST https://zhipu-balance-tracker-production.up.railway.app/api/balance/zhipu-usage</pre>
    </div>

    <script>
        async function testZhipuUsage() {
            const apiKey = document.getElementById('apiKey').value;
            const region = document.getElementById('region').value;
            const resultDiv = document.getElementById('result');
            const testBtn = document.getElementById('testBtn');

            if (!apiKey) {
                alert('请输入 API Key');
                return;
            }

            testBtn.disabled = true;
            testBtn.textContent = '⏳ 查询中...';
            resultDiv.className = 'result show';

            try {
                const response = await fetch('http://localhost:3000/api/balance/zhipu-usage', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ apiKey, region })
                });

                const data = await response.json();

                if (data.success) {
                    resultDiv.className = 'result show success';
                    resultDiv.innerHTML = `
                        <h3>✅ 查询成功！</h3>
                        <p><strong>版本：</strong> ${data.level}</p>
                        <h4>额度详情：</h4>
                        <pre>${JSON.stringify(data.plans, null, 2)}</pre>
                    `;
                } else {
                    resultDiv.className = 'result show error';
                    resultDiv.innerHTML = `
                        <h3>❌ 查询失败</h3>
                        <p><strong>错误信息：</strong> ${data.message || data.error}</p>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    `;
                }
            } catch (error) {
                resultDiv.className = 'result show error';
                resultDiv.innerHTML = `
                    <h3>❌ 网络错误</h3>
                    <p>${error.message}</p>
                    <pre>${error.stack}</pre>
                `;
            } finally {
                testBtn.disabled = false;
                testBtn.textContent = '🚀 测试查询';
            }
        }
    </script>
</body>
</html>
