<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="智谱 AI 平台 Token 余额查看工具">
    <meta name="theme-color" content="#4F46E5">
    <title>智谱余额查看</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/svg+xml" href="/icon.svg">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #4F46E5;
            --primary-dark: #4338ca;
            --success: #10B981;
            --warning: #F59E0B;
            --danger: #EF4444;
            --bg: #F9FAFB;
            --surface: #FFFFFF;
            --text: #111827;
            --text-secondary: #6B7280;
            --border: #E5E7EB;
            --shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        /* Header */
        header {
            background: var(--surface);
            padding: 20px;
            border-radius: 12px;
            box-shadow: var(--shadow);
            margin-bottom: 20px;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: var(--primary);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 20px;
        }

        .logo-text {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text);
        }

        .header-actions {
            display: flex;
            gap: 12px;
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background 0.2s;
        }

        .btn:hover {
            background: var(--primary-dark);
        }

        .btn-success {
            background: var(--success);
        }

        /* Balance Cards */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .balance-card {
            background: var(--surface);
            border-radius: 16px;
            padding: 24px;
            box-shadow: var(--shadow);
            position: relative;
            overflow: hidden;
        }

        .balance-card.alert {
            border: 2px solid var(--danger);
        }

        .balance-card.alert::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--danger);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
        }

        .card-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text);
        }

        .balance-display {
            text-align: center;
            padding: 24px 0;
        }

        .balance-value {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--primary);
        }

        .balance-unit {
            font-size: 1rem;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        .alert-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: var(--danger);
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            margin-top: 8px;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            background: var(--surface);
            border-radius: 16px;
            box-shadow: var(--shadow);
        }

        .empty-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            background: var(--bg);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
        }

        .empty-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .empty-desc {
            color: var(--text-secondary);
        }

        /* Query Section */
        .query-section {
            background: var(--surface);
            border-radius: 16px;
            padding: 24px;
            box-shadow: var(--shadow);
            margin-bottom: 20px;
        }

        .query-title {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 20px;
        }

        .query-form {
            display: grid;
            gap: 16px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--text);
        }

        .form-input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 16px;
        }

        .form-select {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 16px;
            background: white;
        }

        .form-actions {
            display: flex;
            gap: 12px;
        }

        .form-actions .btn {
            flex: 1;
            padding: 12px;
        }

        /* Result Section */
        .result-section {
            background: var(--surface);
            border-radius: 16px;
            padding: 24px;
            box-shadow: var(--shadow);
            margin-bottom: 20px;
            display: none;
        }

        .result-section.show {
            display: block;
        }

        .result-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 16px;
        }

        /* Usage Plans */
        .usage-plans {
            display: grid;
            gap: 16px;
        }

        .usage-plan {
            background: var(--bg);
            border-radius: 12px;
            padding: 16px;
        }

        .usage-plan-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .usage-plan-name {
            font-weight: 600;
            color: var(--text);
        }

        .usage-badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
            color: white;
        }

        .usage-badge.good {
            background: var(--success);
        }

        .usage-badge.medium {
            background: var(--warning);
        }

        .usage-badge.low {
            background: var(--danger);
        }

        .usage-progress {
            height: 8px;
            background: var(--border);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 8px;
        }

        .usage-progress-bar {
            height: 100%;
            transition: width 0.3s ease;
        }

        .usage-progress-bar.low {
            background: var(--danger);
        }

        .usage-progress-bar.medium {
            background: var(--warning);
        }

        .usage-progress-bar.good {
            background: var(--success);
        }

        .usage-info {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: var(--text-secondary);
        }

        /* Loading */
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--text);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 2000;
            display: none;
        }

        .toast.show {
            display: block;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        /* Responsive */
        @media (max-width: 640px) {
            .cards-grid {
                grid-template-columns: 1fr;
            }

            .balance-value {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-content">
                <div class="logo">
                    <div class="logo-icon">智</div>
                    <div class="logo-text">智谱余额</div>
                </div>
                <div class="header-actions">
                    <button class="btn btn-success" onclick="openZhipuUsageModal()">
                        <span>⚡</span> 查询额度
                    </button>
                </div>
            </div>
        </header>

        <div id="balanceCards" class="cards-grid">
            <div class="empty-state">
                <div class="empty-icon">
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
                    </svg>
                </div>
                <h3 class="empty-title">还没有添加账户</h3>
                <p class="empty-desc">点击"查询额度"开始使用</p>
            </div>
        </div>

        <!-- 查询额度 Modal -->
        <div id="zhipuUsageModal" style="display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; padding: 20px;">
            <div style="background: var(--surface); border-radius: 16px; padding: 24px; width: 100%; max-width: 400px; box-shadow: var(--shadow-lg);">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
                    <h3 style="font-size: 1.25rem; font-weight: 700;">智谱 Coding Plan 额度查询</h3>
                    <button onclick="closeZhipuUsageModal()" style="background: none; border: none; font-size: 24px; cursor: pointer; color: var(--text-secondary);">&times;</button>
                </div>
                <div id="zhipuUsageForm" class="query-form">
                    <div class="form-group">
                        <label class="form-label">API Key</label>
                        <input type="password" id="zhipuApiKey" class="form-input" placeholder="输入智谱 API Key">
                    </div>
                    <div class="form-group">
                        <label class="form-label">区域</label>
                        <select id="zhipuRegion" class="form-select">
                            <option value="cn">国内版 (open.bigmodel.cn)</option>
                            <option value="global">国际版 (api.z.ai)</option>
                        </select>
                    </div>
                    <div class="form-actions">
                        <button type="button" class="btn" onclick="closeZhipuUsageModal()" style="background: var(--bg);">取消</button>
                        <button type="button" class="btn btn-success" onclick="queryZhipuUsage()">查询</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 查询结果 -->
        <div id="zhipuUsageResult" class="result-section">
            <div class="result-title">查询结果</div>
            <div id="usageContent"></div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast"></div>

    <script>
        // 简化版 JavaScript，避免错误
        const API_BASE = '/api/balance';
        let balances = [];

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            console.log('页面加载完成');
            loadBalances();
        });

        // 加载余额数据
        async function loadBalances() {
            try {
                const response = await fetch(API_BASE);
                balances = await response.json();
                renderBalances();
            } catch (error) {
                console.error('加载失败:', error);
                renderEmptyState();
            }
        }

        // 渲染余额卡片
        function renderBalances() {
            const container = document.getElementById('balanceCards');

            if (!balances || balances.length === 0) {
                renderEmptyState();
                return;
            }

            container.innerHTML = balances.map(card => {
                const isAlert = card.balance <= card.alertThreshold;
                const lastUpdate = formatDate(card.updatedAt);

                return `
                    <div class="balance-card ${isAlert ? 'alert' : ''}">
                        <div class="card-header">
                            <div class="card-title">${escapeHtml(card.name)}</div>
                        </div>
                        <div class="balance-display">
                            <div class="balance-value">${formatNumber(card.balance)}</div>
                            <div class="balance-unit">${escapeHtml(card.unit)}</div>
                            ${isAlert ? `<div class="alert-badge">⚠️ 余额不足</div>` : ''}
                        </div>
                    </div>
                `;
            }).join('');
        }

        // 渲染空状态
        function renderEmptyState() {
            const container = document.getElementById('balanceCards');
            container.innerHTML = `
                <div class="empty-state">
                    <div class="empty-icon">
                        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
                        </svg>
                    </div>
                    <h3 class="empty-title">还没有添加账户</h3>
                    <p class="empty-desc">点击"查询额度"开始使用</p>
                </div>
            `;
        }

        // 格式化数字
        function formatNumber(num) {
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
            return num.toLocaleString();
        }

        // 格式化日期
        function formatDate(dateStr) {
            if (!dateStr) return '未知';
            const date = new Date(dateStr);
            const now = new Date();
            const diff = now - date;

            if (diff < 60000) return '刚刚';
            if (diff < 3600000) return Math.floor(diff / 60000) + '分钟前';
            if (diff < 86400000) return Math.floor(diff / 3600000) + '小时前';
            return date.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric' });
        }

        // 转义 HTML
        function escapeHtml(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // 打开模态框
        function openZhipuUsageModal() {
            document.getElementById('zhipuUsageModal').style.display = 'flex';
        }

        // 关闭模态框
        function closeZhipuUsageModal() {
            document.getElementById('zhipuUsageModal').style.display = 'none';
        }

        // 查询智谱用量
        async function queryZhipuUsage() {
            const apiKey = document.getElementById('zhipuApiKey').value;
            const region = document.getElementById('zhipuRegion').value;
            const resultSection = document.getElementById('zhipuUsageResult');
            const contentDiv = document.getElementById('usageContent');

            if (!apiKey) {
                showToast('请输入 API Key');
                return;
            }

            resultSection.style.display = 'block';
            contentDiv.innerHTML = '<div class="loading"><div class="spinner"></div></div>';

            try {
                console.log('正在查询智谱用量...');
                const response = await fetch(`${API_BASE}/zhipu-usage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ apiKey, region })
                });

                const data = await response.json();
                console.log('查询结果:', data);

                if (data.success) {
                    renderUsageResult(data);
                    closeZhipuUsageModal();
                } else {
                    contentDiv.innerHTML = `
                        <div style="text-align: center; color: var(--danger); padding: 20px;">
                            <h3>❌ 查询失败</h3>
                            <p>${data.message || '未知错误'}</p>
                        </div>
                    `;
                }
            } catch (error) {
                console.error('查询错误:', error);
                contentDiv.innerHTML = `
                    <div style="text-align: center; color: var(--danger); padding: 20px;">
                        <h3>❌ 网络错误</h3>
                        <p>请检查网络连接后重试</p>
                    </div>
                `;
            }
        }

        // 渲染使用情况结果
        function renderUsageResult(data) {
            const contentDiv = document.getElementById('usageContent');

            let html = `<div style="text-align: center; padding: 20px; background: linear-gradient(135deg, var(--primary) 0%, #6366f1 100%); color: white; border-radius: 8px; margin-bottom: 20px;">
                <strong>📦 ${data.level === 'pro' ? 'Pro 版本' : '标准版本'}</strong>
            </div>`;

            html += '<div class="usage-plans">';

            data.plans.forEach(plan => {
                const percentage = plan.used;
                const statusClass = percentage >= 80 ? 'low' : percentage >= 50 ? 'medium' : 'good';
                const statusText = percentage >= 80 ? '余额不足' : percentage >= 50 ? '使用中' : '充足';

                html += `
                    <div class="usage-plan">
                        <div class="usage-plan-header">
                            <div class="usage-plan-name">${plan.name}</div>
                            <div class="usage-badge ${statusClass}">${statusText}</div>
                        </div>
                        <div class="usage-progress">
                            <div class="usage-progress-bar ${statusClass}" style="width: ${percentage}%"></div>
                        </div>
                        <div class="usage-info">
                            <span>已用: ${plan.used}${plan.unit}</span>
                            <span>剩余: ${plan.remaining}${plan.unit}</span>
                        </div>
                    </div>
                `;
            });

            html += '</div>';

            contentDiv.innerHTML = html;
        }

        // 显示提示
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // 点击遮罩关闭
        document.getElementById('zhipuUsageModal').addEventListener('click', function(e) {
            if (e.target.id === 'zhipuUsageModal') {
                closeZhipuUsageModal();
            }
        });
    </script>
</body>
</html>
