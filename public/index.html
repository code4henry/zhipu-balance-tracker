<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="智谱 AI 平台 Token 余额查看工具">
    <meta name="theme-color" content="#4F46E5">
    <title>智谱余额查看</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/svg+xml" href="/icon.svg">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #4F46E5;
            --primary-dark: #4338ca;
            --success: #10B981;
            --warning: #F59E0B;
            --danger: #EF4444;
            --bg: #F9FAFB;
            --surface: #FFFFFF;
            --text: #111827;
            --text-secondary: #6B7280;
            --border: #E5E7EB;
            --shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header */
        header {
            background: var(--surface);
            padding: 20px;
            box-shadow: var(--shadow);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: var(--primary);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 20px;
        }

        .logo-text {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text);
        }

        .header-actions {
            display: flex;
            gap: 12px;
        }

        .add-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background 0.2s;
        }

        .add-btn:hover {
            background: var(--primary-dark);
        }

        .add-btn svg {
            width: 20px;
            height: 20px;
        }

        /* Cards Grid */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        /* Balance Card */
        .balance-card {
            background: var(--surface);
            border-radius: 16px;
            padding: 24px;
            box-shadow: var(--shadow);
            transition: box-shadow 0.2s;
            position: relative;
            overflow: hidden;
        }

        .balance-card:hover {
            box-shadow: var(--shadow-lg);
        }

        .balance-card.alert {
            border: 2px solid var(--danger);
        }

        .balance-card.alert::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--danger);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
        }

        .card-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text);
        }

        .card-actions {
            display: flex;
            gap: 8px;
        }

        .card-action-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 4px;
            border-radius: 4px;
            transition: all 0.2s;
        }

        .card-action-btn:hover {
            background: var(--bg);
            color: var(--text);
        }

        .balance-display {
            text-align: center;
            padding: 24px 0;
        }

        .balance-value {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--primary);
        }

        .balance-unit {
            font-size: 1rem;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        .balance-info {
            display: flex;
            justify-content: space-around;
            padding-top: 16px;
            border-top: 1px solid var(--border);
        }

        .info-item {
            text-align: center;
        }

        .info-label {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .info-value {
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
        }

        .alert-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: var(--danger);
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            margin-top: 8px;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--surface);
            border-radius: 16px;
            padding: 24px;
            width: 100%;
            max-width: 400px;
            box-shadow: var(--shadow-lg);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .modal-title {
            font-size: 1.25rem;
            font-weight: 700;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--text-secondary);
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--text);
        }

        .form-input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.2s;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .form-help {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        .form-actions {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
        }

        .btn-secondary {
            background: var(--bg);
            color: var(--text);
        }

        .btn-secondary:hover {
            background: var(--border);
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
        }

        .empty-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            background: var(--bg);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
        }

        .empty-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .empty-desc {
            color: var(--text-secondary);
        }

        /* Loading */
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--text);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 2000;
            display: none;
        }

        .toast.show {
            display: block;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        /* 智谱额度查询结果 */
        .usage-plans {
            margin-top: 16px;
        }

        .usage-plan {
            background: var(--bg);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 12px;
        }

        .usage-plan-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .usage-plan-name {
            font-weight: 600;
            color: var(--text);
        }

        .usage-plan-badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
        }

        .usage-plan-badge.low {
            background: var(--danger);
            color: white;
        }

        .usage-plan-badge.medium {
            background: var(--warning);
            color: white;
        }

        .usage-plan-badge.good {
            background: var(--success);
            color: white;
        }

        .usage-progress {
            height: 8px;
            background: var(--border);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 8px;
        }

        .usage-progress-bar {
            height: 100%;
            transition: width 0.3s ease;
        }

        .usage-progress-bar.low {
            background: var(--danger);
        }

        .usage-progress-bar.medium {
            background: var(--warning);
        }

        .usage-progress-bar.good {
            background: var(--success);
        }

        .usage-info {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .usage-level {
            text-align: center;
            padding: 12px;
            background: linear-gradient(135deg, var(--primary) 0%, #6366f1 100%);
            color: white;
            border-radius: 8px;
            margin-bottom: 16px;
            font-weight: 600;
        }

        .usage-chart-container {
            background: var(--bg);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 16px;
        }

        .usage-chart-container canvas {
            max-height: 200px !important;
        }

        /* Responsive */
        @media (max-width: 640px) {
            .cards-grid {
                grid-template-columns: 1fr;
            }

            .balance-value {
                font-size: 2rem;
            }

            .container {
                padding: 16px;
            }

            header {
                padding: 16px;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <div class="logo">
                <div class="logo-icon">智</div>
                <div class="logo-text">智谱余额</div>
            </div>
            <div class="header-actions">
                <button class="add-btn" onclick="openZhipuUsageModal()" style="background: var(--success);">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
                    </svg>
                    查询额度
                </button>
                <button class="add-btn" onclick="openModal()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 5v14M5 12h14"/>
                    </svg>
                    添加账户
                </button>
            </div>
        </div>
    </header>

    <div class="container">
        <div id="balanceCards" class="cards-grid">
            <div class="loading">
                <div class="spinner"></div>
            </div>
        </div>
    </div>

    <!-- Modal -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title" id="modalTitle">添加账户</h3>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <form id="balanceForm">
                <input type="hidden" id="editId">
                <div class="form-group">
                    <label class="form-label">账户名称</label>
                    <input type="text" class="form-input" id="accountName" placeholder="例如：主账号" required>
                </div>
                <div class="form-group">
                    <label class="form-label">当前余额</label>
                    <input type="number" class="form-input" id="balance" placeholder="输入余额数量" required>
                    <div class="form-help">请在智谱开放平台控制台查看余额后输入</div>
                </div>
                <div class="form-group">
                    <label class="form-label">单位</label>
                    <select class="form-input" id="unit">
                        <option value="tokens">Tokens</option>
                        <option value="元">元</option>
                        <option value="积分">积分</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">警告阈值</label>
                    <input type="number" class="form-input" id="alertThreshold" placeholder="低于此值时提醒" value="10000">
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">取消</button>
                    <button type="submit" class="btn btn-primary">保存</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 智谱额度查询 Modal -->
    <div id="zhipuUsageModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">智谱 Coding Plan 额度查询</h3>
                <button class="modal-close" onclick="closeZhipuUsageModal()">&times;</button>
            </div>
            <form id="zhipuUsageForm">
                <div class="form-group">
                    <label class="form-label">API Key</label>
                    <input type="password" class="form-input" id="zhipuApiKey" placeholder="输入智谱 API Key" required>
                    <div class="form-help">在智谱开放平台获取：https://open.bigmodel.cn/apikeys</div>
                </div>
                <div class="form-group">
                    <label class="form-label">区域</label>
                    <select class="form-input" id="zhipuRegion">
                        <option value="cn">国内版 (open.bigmodel.cn)</option>
                        <option value="global">国际版 (api.z.ai)</option>
                    </select>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeZhipuUsageModal()">取消</button>
                    <button type="submit" class="btn btn-primary">查询</button>
                </div>
            </form>
            <div id="zhipuUsageResult" style="display: none; margin-top: 20px;">
                <!-- 查询结果将显示在这里 -->
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast"></div>

    <script src="/app.js"></script>
</body>
</html>
